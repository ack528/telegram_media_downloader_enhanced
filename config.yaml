api_hash: your_api_hash
api_id: your_api_id
language: ZH
chat:
- chat_id: telegram_chat_id
  last_read_message_id: 0
file_formats:
  audio:
  - all
  document:
  - all
  video:
  - all
file_path_prefix:
- chat_title
- media_datetime
media_types:
- audio
- photo
- video
- document
- voice
- video_note
download_stall_timeout: 90
zero_speed_reconnect_seconds: 180
client_reconnect_cooldown: 300
history_fetch_timeout: 60
history_fetch_retries: 3
history_retry_delay: 30
scan_prefetch_limit: 5
clash:
  enabled: true
  controller: http://127.0.0.1:9097
  secret: "999"
proxy:
  scheme: socks5
  hostname: 127.0.0.1
  port: 7897
# in linux please use /
# save_path: E:\github\telegram_media_downloader
